<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerar PDF - Pauta Videoconferência</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <!-- jsPDF via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Gerar PDF para assinatura</h1>
    <p class="subtitle">
      Preencha os dados abaixo para gerar um PDF com a pauta de
      utilização de chamadas de vídeo nas assembleias.
    </p>

    <form id="form-pdf">
      <div class="form-group">
        <label for="nome">Nome completo do condômino</label>
        <input type="text" id="nome" name="nome" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="quadra">Quadra / Bloco</label>
          <input type="text" id="quadra" name="quadra" required />
        </div>

        <div class="form-group">
          <label for="lote">Lote / Unidade</label>
          <input type="text" id="lote" name="lote" required />
        </div>
      </div>

      <div class="form-group">
        <label for="condominio">Nome do condomínio</label>
        <input type="text" id="condominio" name="condominio" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cidade">Cidade / UF</label>
          <input type="text" id="cidade" name="cidade" placeholder="Ex: Brasília/DF" required />
        </div>

        <div class="form-group">
          <label for="data-assembleia">Data da assembleia</label>
          <input type="date" id="data-assembleia" name="data-assembleia" required />
        </div>
      </div>

      <button type="submit" class="btn">Gerar PDF</button>
    </form>

    <p class="footer">
      O PDF será baixado automaticamente com o texto pronto para impressão e assinatura.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
